spring.application.name=Project-Management-System

spring.datasource.url=jdbc:mysql://localhost:3306/projectmanagement?serverTimezone=Asia/Kolkata&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.format_sql=false
jwt.SecretKey=${JWT_SECRET}
cors.allowed-origins=http://localhost:5173,https://pms-frontend-silk.vercel.app

# JVM heap cap — prevents Railway OOM killer
server.tomcat.max-threads=20
spring.jpa.properties.hibernate.connection.pool_size=3